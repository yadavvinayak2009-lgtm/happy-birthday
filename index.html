<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        /* Polaroid Gallery Styles */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 15px 10px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: rotate(-4deg);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .polaroid:nth-child(2) {
            transform: rotate(5deg);
            margin-top: 10px;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
        }

        .polaroid img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 3px;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday chutku mutku Aanya! 🎂</h1>
        
        <!-- Photo Gallery -->
        <div class="gallery">
            <div class="polaroid">
                <!-- Change "photo1.jpg" to your actual image file name -->
                <img src="photo1.jpg" alt="Memory 1">
            </div>
            <div class="polaroid">
                <!-- Change "photo2.jpg" to your actual image file name -->
                <img src="photo2.jpg" alt="Memory 2">
            </div>
        </div>

        <p>Wishing you a very very happy birthday to my favourite person, my favourite notification. I wish for your good health and happiness and most importantly praying for your success in all your endeavors.
            
        </p>
        
        <!-- Hidden Audio Player -->
        <!-- Change "song.mp3" to the actual music file name -->
        <audio id="bgMusic" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>

        <button id="celebrateBtn">Click to Celebrate! 🎉</button>
    </div>

    <!-- Confetti Script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        document.getElementById('celebrateBtn').addEventListener('click', () => {
            
            // Play the music!
            const music = document.getElementById('bgMusic');
            music.play();

            // Confetti explosion
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        });

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }
    </script>
</body>
</html>
